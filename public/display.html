<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LyricsMaster - Nu spelas</title>
<meta name="theme-color" content="#15120e">
<link rel="icon" href="icons/icon-192.png">
<style>
  :root {
    --bg: #14110d;
    --amber: #e8a33d;
    --teal: #59968f;
    --text: #f3ede1;
    --text-dim: #b7ab96;
    --border: #382f22;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  #stage { text-align: center; padding: 40px; width: 100%; }
  .label {
    font-size: clamp(16px, 2.2vw, 28px);
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--text-dim); margin-bottom: 6px;
  }
  .now-title {
    font-size: clamp(40px, 9vw, 130px);
    font-weight: 800; color: var(--amber);
    line-height: 1.05; margin-bottom: 10px;
    word-break: break-word;
  }
  .now-meta {
    font-size: clamp(18px, 2.4vw, 32px);
    color: var(--text-dim); margin-bottom: 50px;
  }
  .next-label { font-size: clamp(14px, 1.8vw, 22px); color: var(--teal); text-transform: uppercase; letter-spacing: 0.1em; }
  .next-title { font-size: clamp(24px, 5vw, 60px); font-weight: 700; color: var(--text); margin-top: 6px; }
  .group-tag {
    display: inline-block; margin-top: 14px; padding: 4px 16px;
    border: 1px solid var(--amber); border-radius: 20px;
    color: var(--amber); font-size: clamp(14px, 1.6vw, 20px);
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  #idle { color: var(--text-dim); font-size: clamp(20px, 3vw, 36px); }
  #idle img { width: 96px; height: 96px; border-radius: 20px; margin-bottom: 20px; }
  .conn-dot {
    position: fixed; top: 16px; right: 16px; width: 10px; height: 10px;
    border-radius: 50%; background: var(--teal); opacity: 0.6;
  }
  .conn-dot.offline { background: #d1573f; }
</style>
</head>
<body>
<div class="conn-dot" id="connDot"></div>
<div id="stage">
  <div id="idle">
    <img src="icons/icon-192.png" alt="LyricsMaster">
    <div>Väntar på att ett set ska starta…</div>
  </div>
</div>
<script src="display.js"></script>
</body>
</html>
